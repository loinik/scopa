// ═══════════════════════ GAME LOGIC ═══════════════════════
const PRI={7:21,6:18,1:16,5:15,4:14,3:13,2:12,8:10,9:10,10:10};
function mkDeck(){const d=[];for(const s of['$','X','C','B'])for(let v=1;v<=10;v++)d.push({id:`${v}${s}`,v,s});return d;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}
function subsets(a){const res=[],n=a.length;for(let m=1;m<(1<<n);m++){const s=[];for(let i=0;i<n;i++)if(m>>i&1)s.push(a[i]);res.push(s);}return res;}
function getCaps(c,table){
  const ex=table.filter(t=>t.v===c.v);if(ex.length)return[ex];
  return subsets(table).filter(s=>s.length>1&&s.reduce((a,t)=>a+t.v,0)===c.v);
}
function isScopa(table,cap){return cap.length===table.length&&table.length>0;}
function score(pile,sc){
  const den=pile.filter(c=>c.s==='$').length;
  const sb=pile.some(c=>c.v===7&&c.s==='$')?1:0;
  const pm={};pile.forEach(c=>{const p=PRI[c.v];if(!pm[c.s]||p>pm[c.s])pm[c.s]=p;});
  return{n:pile.length,den,sb,sc,pp:Object.values(pm).reduce((a,v)=>a+v,0)};
}
function cmpScore(ps,es){
  const r={p:0,e:0};
  if(ps.n>es.n)r.p++;else if(es.n>ps.n)r.e++;
  if(ps.den>es.den)r.p++;else if(es.den>ps.den)r.e++;
  r.p+=ps.sb;r.e+=es.sb;
  if(ps.pp>es.pp)r.p++;else if(es.pp>ps.pp)r.e++;
  r.p+=ps.sc;r.e+=es.sc;
  return r;
}
function enricoAI(hand,table){
  // 1. Settebello
  for(const c of hand)for(const cap of getCaps(c,table))if(cap.some(x=>x.v===7&&x.s==='$'))return{c,cap};
  // 2. Scopa
  for(const c of hand)for(const cap of getCaps(c,table))if(isScopa(table,cap))return{c,cap};
  // 3. Most denari
  let best=null;
  for(const c of hand){const caps=getCaps(c,table);if(caps.length){const cap=caps[0];const d=cap.filter(x=>x.s==='$').length;if(!best||d>best.d||(d===best.d&&cap.length>best.cap.length))best={c,cap,d};}}
  if(best)return{c:best.c,cap:best.cap};
  // 4. Any capture
  for(const c of hand){const caps=getCaps(c,table);if(caps.length)return{c,cap:caps[0]};}
  // 5. Discard lowest (keep 7$ if possible)
  const s=[...hand].sort((a,b)=>a.v-b.v);
  return{c:s.find(c=>!(c.v===7&&c.s==='$'))||s[0],cap:null};
}

// ═══════════════════════ CANVAS SETUP ═══════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const msg=document.getElementById('msg');

function resize(){
  const s=Math.min(window.innerWidth/640,window.innerHeight/385);
  canvas.style.width=`${640*s}px`;canvas.style.height=`${385*s}px`;
}
window.addEventListener('resize',resize);resize();

const imgs={};let loadN=0;
function loadImg(k,src){const i=new Image();i.onload=()=>{imgs[k]=i;if(++loadN===3)buildOvl();};i.src=src;}
loadImg('bg',BG_SRC);loadImg('ovl',OVL_SRC);loadImg('cards',CARDS_SRC);

// Remove chroma-key (lime-green → transparent) from OVL
let ovlC=null;
function buildOvl(){
  ovlC=document.createElement('canvas');ovlC.width=211;ovlC.height=141;
  const oc=ovlC.getContext('2d');oc.drawImage(imgs.ovl,0,0);
  const id=oc.getImageData(0,0,211,141),d=id.data;
  for(let i=0;i<d.length;i+=4)if(d[i]<55&&d[i+1]>190&&d[i+2]<65)d[i+3]=0;
  oc.putImageData(id,0,0);
  initGame();
}

// ═══════════════════════ DRAW HELPERS ═══════════════════════
function card(c,x,y){ctx.drawImage(imgs.cards,VAL_SX[c.v-1],SUIT_SY[c.s],CW,CH,x,y,CW,CH);}
function back(x,y){ctx.drawImage(imgs.cards,BACK_SX,BACK_SY,CW,CH,x,y,CW,CH);}

function glow(x,y,w,h,col,blur){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.5;
  ctx.shadowColor=col;ctx.shadowBlur=blur||12;
  ctx.strokeRect(x+.5,y+.5,w-1,h-1);ctx.restore();
}
function dim(c,x,y){ctx.save();ctx.globalAlpha=.35;card(c,x,y);ctx.restore();}

// Enrico badge (styled after original: gold border, dark red bar, mask icon)
function drawEnricoBadge(pts,sc){
  const {x,y}=EBADGE,W=148,H=62;
  // Background
  ctx.fillStyle='rgba(8,3,0,0.82)';
  ctx.beginPath();ctx.roundRect(x,y,W,H,8);ctx.fill();
  ctx.strokeStyle='#c8960c';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(x,y,W,H,8);ctx.stroke();
  // ENRICO text
  ctx.font='bold 18px "Palatino Linotype",Georgia,serif';
  ctx.fillStyle='#f0c018';ctx.fillText('ENRICO',x+8,y+21);
  // Score bar
  ctx.fillStyle='#6a0808';ctx.beginPath();ctx.roundRect(x+8,y+28,W-16,22,4);ctx.fill();
  ctx.font='bold 14px "Palatino Linotype"';ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.fillText(`${pts} pts  ⚡${sc}`,x+W/2,y+43);
  ctx.textAlign='left';
  // Mask circle hint (just decorative)
  ctx.beginPath();ctx.arc(x+W-18,y+20,14,0,Math.PI*2);
  ctx.fillStyle='#1a4030';ctx.fill();
  ctx.strokeStyle='#c8960c';ctx.lineWidth=1.5;ctx.stroke();
  ctx.font='16px serif';ctx.textAlign='center';ctx.fillStyle='#20d080';
  ctx.fillText('🎭',x+W-18,y+25);ctx.textAlign='left';
}

// Nancy badge (styled after original: teal, blue bar, ram icon)
function drawNancyBadge(pts,sc){
  const {x,y}=NBADGE,W=200,H=62;
  ctx.fillStyle='rgba(0,10,30,0.85)';
  ctx.beginPath();ctx.roundRect(x,y,W,H,10);ctx.fill();
  ctx.strokeStyle='#18c8d0';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(x,y,W,H,10);ctx.stroke();
  // Avatar circle
  ctx.beginPath();ctx.arc(x+36,y+31,26,0,Math.PI*2);
  ctx.fillStyle='#0a3050';ctx.fill();
  ctx.strokeStyle='#18c8d0';ctx.lineWidth=2;ctx.stroke();
  ctx.font='22px serif';ctx.textAlign='center';
  ctx.fillText('🐏',x+36,y+38);ctx.textAlign='left';
  // NANCY text
  ctx.font='bold 16px "Palatino Linotype"';ctx.fillStyle='#18c8d0';
  ctx.fillText('NANCY',x+68,y+22);
  // Score bar
  ctx.fillStyle='#0a1850';ctx.beginPath();ctx.roundRect(x+68,y+29,W-76,22,4);ctx.fill();
  ctx.font='bold 14px "Palatino Linotype"';ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.fillText(`${pts} pts  ⚡${sc}`,x+68+(W-76)/2,y+43);
  ctx.textAlign='left';
}

// TAKE/DISCARD button (embossed felt style)
function drawFeltBtn(label,rect,active){
  ctx.save();
  // Shadow fill
  ctx.fillStyle=active?'rgba(60,120,0,0.35)':'rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.roundRect(rect.x,rect.y,rect.w,rect.h,5);ctx.fill();
  // Border
  ctx.strokeStyle=active?'#90e040':'rgba(140,180,60,0.55)';
  ctx.lineWidth=active?2:1.5;
  if(active){ctx.shadowColor='#90e040';ctx.shadowBlur=10;}
  ctx.beginPath();ctx.roundRect(rect.x,rect.y,rect.w,rect.h,5);ctx.stroke();
  // Text (engraved felt look)
  ctx.font=`bold 14px "Palatino Linotype",Georgia`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=active?'#c8ff60':'rgba(160,200,80,0.7)';
  ctx.shadowColor=active?'#80ff00':'transparent';ctx.shadowBlur=active?6:0;
  ctx.fillText(label,rect.x+rect.w/2,rect.y+rect.h/2);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}

// X / ? circle buttons (felt style, from screenshots)
function drawCircBtn(label,b,active){
  ctx.save();
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fill();
  ctx.strokeStyle='rgba(120,160,40,0.55)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.font=`bold 12px "Palatino Linotype"`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(140,180,60,0.8)';ctx.fillText(label,b.x,b.y);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}

// Deck indicator (diagonal card back)
function deckIndicator(cx,cy,angle,n){
  if(n<=0)return;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  // Shadow back
  ctx.globalAlpha=0.5;ctx.translate(3,3);
  ctx.drawImage(imgs.cards,BACK_SX,BACK_SY,CW,CH,-CW/2,-CH/2,CW,CH);
  ctx.translate(-3,-3);ctx.globalAlpha=1;
  ctx.drawImage(imgs.cards,BACK_SX,BACK_SY,CW,CH,-CW/2,-CH/2,CW,CH);
  ctx.restore();
}

// ═══════════════════════ GAME STATE ═══════════════════════
let G={};
function initGame(){
  G={deck:shuffle(mkDeck()),pH:[],eH:[],table:[],
     pP:[],eP:[],pSc:0,eSc:0,totP:0,totE:0,
     phase:'player',sel:null,caps:[],chosen:null,lastCap:'',
     round:1,flash:0,fCol:'#f0c040',fTxt:''};
  G.pH=G.deck.splice(0,3);G.eH=G.deck.splice(0,3);G.table=G.deck.splice(0,4);
  render();
}

// ═══════════════════════ RENDER ═══════════════════════
function render(){
  ctx.clearRect(0,0,640,385);

  // ─ 1. Background (BG has gold grid, decorations, diamonds) ─
  ctx.drawImage(imgs.bg,0,0,640,385);

  // ─ 2. Deck indicators (diagonal, in corners — BG already has diamond art underneath) ─
  // Top-right (Enrico deck): centered at x=575, y=46, tilted
  deckIndicator(574,46,-0.3,G.deck.length);
  // Bottom-left (Nancy deck): centered at x=72, y=330, tilted opposite
  deckIndicator(72,330,0.3,G.deck.length);

  // ─ 3. Table cards (5×2, fill order center-out) ─
  for(let i=0;i<G.table.length&&i<TSLOTS.length;i++){
    const sl=TSLOTS[i],c=G.table[i];
    if(!c)continue;
    const inChosen=G.chosen&&G.chosen.some(x=>x.id===c.id);
    const inAnyCap=G.caps.some(cap=>cap.some(x=>x.id===c.id));
    if(inChosen)      {card(c,sl.x,sl.y);glow(sl.x,sl.y,CW,CH,'#60ffb0',14);}
    else if(G.sel&&!inAnyCap) dim(c,sl.x,sl.y);
    else              card(c,sl.x,sl.y);
  }

  // ─ 4. Enrico hand (3 face-down backs, upright, brown zone) ─
  for(let i=0;i<G.eH.length;i++) back(EH_XS[i],EH_Y);

  // ─ 5. Nancy's played card slot (OVL left back, always shown) ─
  // Draw OVL left card back region (chroma-keyed)
  ctx.drawImage(ovlC, 0,0,93,92, SLOT.x,SLOT.y,SLOT.w,SLOT.h);
  if(G.sel){
    // Overlay selected card face on the slot
    const cx=SLOT.x+(SLOT.w-CW)/2, cy=SLOT.y+(SLOT.h-CH)/2;
    card(G.sel,cx,cy);
    glow(SLOT.x,SLOT.y,SLOT.w,SLOT.h,'#f0c040',8);
  }

  // ─ 6. Capture preview: if chosen, show 1st captured card alongside ─
  if(G.chosen&&G.chosen.length>0){
    // Show small stack count near slot
    const cx2=SLOT.x+SLOT.w+6, cy2=SLOT.y+4;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath();ctx.roundRect(cx2,cy2,54,18,4);ctx.fill();
    ctx.font='bold 10px "Palatino Linotype"';ctx.fillStyle='#60ffb0';
    ctx.fillText(`↓ ${G.chosen.map(c=>c.id).join('+')}`,cx2+3,cy2+12);
  }

  // ─ 7. TAKE and DISCARD buttons ─
  const canTake=G.phase==='player'&&G.sel&&G.chosen;
  const canDiscard=G.phase==='player'&&G.sel;
  drawFeltBtn('TAKE',BTN_T,canTake);
  drawFeltBtn('DISCARD',BTN_D,canDiscard);

  // ─ 8. X and ? circle buttons ─
  drawCircBtn('✕',BTN_X,false);
  drawCircBtn('?',BTN_Q,false);

  // ─ 9. Nancy's hand (face-up, teal zone) ─
  for(let i=0;i<G.pH.length;i++){
    const c=G.pH[i];
    const isSel=G.sel&&G.sel.id===c.id;
    if(isSel){card(c,NH_XS[i],NH_Y-12);glow(NH_XS[i],NH_Y-12,CW,CH,'#f0c040',12);}
    else card(c,NH_XS[i],NH_Y);
  }

  // ─ 10. Score badges (styled after originals) ─
  const ps=score(G.pP,G.pSc),es=score(G.eP,G.eSc);
  drawEnricoBadge(G.totE,G.eSc);
  drawNancyBadge(G.totP,G.pSc);

  // Pile/deck info
  ctx.font='10px "Palatino Linotype"';ctx.fillStyle='rgba(200,180,100,0.7)';
  ctx.fillText(`Mazzo: ${G.deck.length}`,SLOT.x,SLOT.y-5);
  ctx.fillText(`Carte: ${G.pP.length}`,SLOT.x+70,SLOT.y-5);

  // ─ 11. Enrico thinking ─
  if(G.phase==='enrico'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(150,8,130,18);
    ctx.font='italic 11px "Palatino Linotype"';ctx.fillStyle='#e08060';
    ctx.fillText('Enrico pensa…',153,20);
  }

  // ─ 12. Caps hint ─
  if(G.caps.length>1&&G.sel){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(SLOT.x,SLOT.y+SLOT.h+4,170,14);
    ctx.font='10px "Palatino Linotype"';ctx.fillStyle='#80d880';
    ctx.fillText(`${G.caps.length} catture — clicca sul tavolo`,SLOT.x+2,SLOT.y+SLOT.h+14);
  }

  // ─ 13. Flash ─
  if(G.flash>0){
    ctx.save();
    ctx.globalAlpha=G.flash/40*0.45;ctx.fillStyle=G.fCol;ctx.fillRect(0,0,640,385);
    ctx.globalAlpha=Math.min(1,G.flash/16);
    ctx.font='bold 46px "Palatino Linotype"';ctx.textAlign='center';
    ctx.fillStyle=G.fCol;ctx.shadowColor=G.fCol;ctx.shadowBlur=22;
    ctx.fillText(G.fTxt,320,200);ctx.restore();
    G.flash--;requestAnimationFrame(render);
  }
}

// ═══════════════════════ ACTIONS ═══════════════════════
function flash(t,c){G.flash=38;G.fTxt=t;G.fCol=c||'#f0c040';render();}

function selCard(c){
  if(G.phase!=='player')return;
  if(G.sel&&G.sel.id===c.id){G.sel=null;G.caps=[];G.chosen=null;}
  else{G.sel=c;G.caps=getCaps(c,G.table);G.chosen=G.caps.length===1?G.caps[0]:null;}
  render();
}
function cycleCap(tc){
  if(!G.sel||G.phase!=='player')return;
  const rel=G.caps.filter(cap=>cap.some(c=>c.id===tc.id));if(!rel.length)return;
  const idx=G.chosen?G.caps.findIndex(cap=>cap.every(c=>G.chosen.some(x=>x.id===c.id))):-1;
  G.chosen=G.caps[(idx+1)%G.caps.length];render();
}
function doTake(){
  if(!G.sel||!G.chosen||G.phase!=='player')return;
  const c=G.sel,cap=G.chosen,sc=isScopa(G.table,cap);
  G.table=G.table.filter(t=>!cap.some(x=>x.id===t.id));
  G.pP.push(c,...cap);G.pH=G.pH.filter(t=>t.id!==c.id);
  G.lastCap='p';if(sc){G.pSc++;flash('⚡ SCOPA!','#f0c040');}
  G.sel=null;G.caps=[];G.chosen=null;afterP();
}
function doDiscard(){
  if(!G.sel||G.phase!=='player')return;
  G.table.push(G.sel);G.pH=G.pH.filter(c=>c.id!==G.sel.id);
  G.lastCap='';G.sel=null;G.caps=[];G.chosen=null;afterP();
}
function afterP(){
  if(!G.pH.length&&!G.eH.length){redeal();return;}
  G.phase='enrico';render();setTimeout(doEnrico,600+Math.random()*900);
}
function doEnrico(){
  if(G.phase!=='enrico')return;
  const{c,cap}=enricoAI(G.eH,G.table);
  if(cap){
    G.table=G.table.filter(t=>!cap.some(x=>x.id===t.id));
    G.eP.push(c,...cap);G.lastCap='e';
    if(isScopa(G.table,cap)){G.eSc++;flash('Enrico SCOPA!','#e07070');}
  } else G.table.push(c);
  G.eH=G.eH.filter(t=>t.id!==c.id);
  if(!G.pH.length&&!G.eH.length)redeal();else{G.phase='player';render();}
}
function redeal(){
  if(G.table.length){(G.lastCap==='p'?G.pP:G.eP).push(...G.table);G.table=[];}
  if(G.deck.length>=6){
    G.pH=G.deck.splice(0,3);G.eH=G.deck.splice(0,3);G.phase='player';render();
  } else endRound();
}
function endRound(){
  const ps=score(G.pP,G.pSc),es=score(G.eP,G.eSc),pts=cmpScore(ps,es);
  G.totP+=pts.p;G.totE+=pts.e;G.phase='end';
  const L=(a,b,n)=>`${n}: ${a} vs ${b}  →  ${a>b?'Nancy +1':b>a?'Enrico +1':'pari'}`;
  showMsg(`Fine Round ${G.round}`,
    [L(ps.n,es.n,'Carte'),L(ps.den,es.den,'Denari'),
     `Settebello: ${ps.sb?'Nancy ✓':'Enrico ✓'}`,
     L(ps.pp,es.pp,'Primiera'),L(ps.sc,es.sc,'Scope'),
     '─────────────────────────',
     `Nancy ${G.totP}  —  Enrico ${G.totE}`,
    ].join('\n'),()=>{
    if(G.totP>=6||G.totE>=6){
      showMsg(G.totP>G.totE?'🏆 Nancy Vince!':'💀 Enrico Vince!',
        `Punteggio: Nancy ${G.totP} — Enrico ${G.totE}`,
        ()=>{G.totP=0;G.totE=0;G.round=1;newRound();});
    } else{G.round++;newRound();}
  });
}
function newRound(){
  G.deck=shuffle(mkDeck());G.pP=[];G.eP=[];G.pSc=0;G.eSc=0;G.lastCap='';
  G.pH=G.deck.splice(0,3);G.eH=G.deck.splice(0,3);G.table=G.deck.splice(0,4);
  G.sel=null;G.caps=[];G.chosen=null;G.phase='player';render();
}
function showMsg(title,body,cb){
  document.getElementById('mh').textContent=title;
  document.getElementById('mb').textContent=body;
  msg.style.display='block';
  document.getElementById('mk').onclick=()=>{msg.style.display='none';if(cb)cb();};
}

// ═══════════════════════ INPUT ═══════════════════════
function xy(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(640/r.width),y:(e.clientY-r.top)*(385/r.height)};}
function hit(x,y,rx,ry,rw,rh){return x>=rx&&x<rx+rw&&y>=ry&&y<ry+rh;}
function hitC(x,y,b){return Math.hypot(x-b.x,y-b.y)<b.r;}

canvas.addEventListener('click',e=>{
  if(G.phase!=='player'||msg.style.display!=='none')return;
  const{x,y}=xy(e);
  if(G.sel&&G.chosen&&hit(x,y,BTN_T.x,BTN_T.y,BTN_T.w,BTN_T.h)){doTake();return;}
  if(G.sel&&hit(x,y,BTN_D.x,BTN_D.y,BTN_D.w,BTN_D.h)){doDiscard();return;}
  for(let i=0;i<G.pH.length;i++){
    const raised=G.sel&&G.sel.id===G.pH[i].id?12:0;
    if(hit(x,y,NH_XS[i],NH_Y-raised,CW,CH+raised)){selCard(G.pH[i]);return;}
  }
  for(let i=0;i<G.table.length&&i<TSLOTS.length;i++){
    const s=TSLOTS[i];
    if(hit(x,y,s.x,s.y,CW,CH)&&G.sel){cycleCap(G.table[i]);return;}
  }
});

canvas.addEventListener('mousemove',e=>{
  if(G.phase!=='player'){canvas.style.cursor='default';return;}
  const{x,y}=xy(e);
  let cur='default';
  for(let i=0;i<G.pH.length;i++)if(hit(x,y,NH_XS[i],NH_Y-12,CW,CH+12)){cur='pointer';break;}
  if(cur==='default'&&G.sel){
    if(G.chosen&&hit(x,y,BTN_T.x,BTN_T.y,BTN_T.w,BTN_T.h))cur='pointer';
    if(hit(x,y,BTN_D.x,BTN_D.y,BTN_D.w,BTN_D.h))cur='pointer';
    for(let i=0;i<G.table.length&&i<TSLOTS.length;i++){
      const s=TSLOTS[i];
      if(hit(x,y,s.x,s.y,CW,CH)&&G.caps.some(c=>c.some(t=>t.id===G.table[i].id))){cur='pointer';break;}
    }
  }
  canvas.style.cursor=cur;
});
</script>
